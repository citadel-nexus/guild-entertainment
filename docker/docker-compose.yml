version: '3.8'
services:
  guild-entertainment:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8400:8400"
    environment:
      - NATS_URL=nats://nats:4222
      - GUILD_PORT=8400
      - GUILD_NAME=entertainment
    depends_on:
      - nats
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
